<!DOCTYPE html>
<html lang="pt-BR" data-theme="light" data-atmosphere="day">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0284c7" />
    <meta name="description" content="KeClima – meteorologia completa em um Progressive Web App." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="KeClima" />
    <title>KeClima</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/svg+xml" href="./public/assets/icons/icon.svg" />
    <link rel="apple-touch-icon" href="./public/assets/icons/icon-192.png" />
    <!-- Libs locais (offline / sem CDN) -->
    <link rel="stylesheet" href="./public/vendor/leaflet/leaflet.css" />
    <link rel="stylesheet" href="./src/styles/main.css?v=0.8.11" />
  </head>
  <body>
    <div id="splash" aria-hidden="true">
      <div class="splash-inner">
        <span class="splash-logo">⛅</span>
        <h1 class="splash-title">KeClima</h1>
        <p class="splash-sub">Meteorologia completa</p>
        <div class="splash-spinner" role="status" aria-label="Carregando"></div>
      </div>
    </div>

    <div id="app"></div>

    <script src="./public/vendor/leaflet/leaflet.js"></script>
    <script src="./public/vendor/chartjs/chart.umd.min.js"></script>
    <script>
      // Ícones Leaflet: caminho absoluto a partir da raiz do site (evita ícone quebrado)
      (function () {
        if (typeof L === 'undefined' || !L.Icon || !L.Icon.Default) return;
        var base = (function () {
          try {
            var path = location.pathname || '/';
            // se abrir .../index.html, sobe para a pasta do app
            if (/index\.html$/i.test(path)) {
              path = path.replace(/index\.html$/i, '');
            }
            if (!path.endsWith('/')) {
              path = path.replace(/[^/]+$/, '');
            }
            return path || '/';
          } catch (e) {
            return '/';
          }
        })();
        var img = base + 'public/vendor/leaflet/images/';
        L.Icon.Default.imagePath = img;
        L.Icon.Default.mergeOptions({
          iconUrl: img + 'marker-icon.png',
          iconRetinaUrl: img + 'marker-icon-2x.png',
          shadowUrl: img + 'marker-shadow.png',
          iconSize: [25, 41],
          iconAnchor: [12, 41],
          popupAnchor: [1, -34],
          shadowSize: [41, 41],
        });
      })();
    </script>
    <script type="module" src="./src/main.js?v=0.8.11"></script>
    <script>
      setTimeout(function () {
        var s = document.getElementById('splash');
        if (s) {
          s.classList.add('splash-hide');
          setTimeout(function () {
            s.remove();
          }, 400);
        }
      }, 3000);
    </script>
  </body>
</html>
